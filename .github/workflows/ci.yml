name: CI - Tests and Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: [self-hosted, linux, x64, server]
    env:
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    strategy:
      matrix:
        include:
          - python-version: "3.11"
            container-image: python:3.11-bookworm
          - python-version: "3.12"
            container-image: python:3.12-bookworm

    container:
      image: ${{ matrix.container-image }}
      options: --user 1000:1000

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: .pip-cache
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Create virtual environment
        run: |
          python -m venv .venv
          ./.venv/bin/pip install -r requirements.txt
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  benchmark:
    runs-on: [self-hosted, linux, x64, server]
    needs: test
    if: github.event_name == 'pull_request'
    env:
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    container:
      image: python:3.12-bookworm
      options: --user 1000:1000
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          path: candidate
          clean: false

      - uses: actions/checkout@v4
        with:
          ref: main
          path: baseline
          clean: false

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: .pip-cache
          key: pip-${{ runner.os }}-benchmark-${{ hashFiles('candidate/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-benchmark-

      - name: Create virtual environment
        run: |
          python -m venv .venv
          ./.venv/bin/pip install -r candidate/requirements.txt
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Run candidate benchmark
        run: |
          cd candidate
          python benchmark.py --output benchmark_candidate.json --viz viz 2>/dev/null | tee benchmark_output.md

      - name: Run method benchmark
        run: |
          cd candidate
          python benchmark_methods.py \
            --methods solver strategy:volume_desc strategy:base_area_desc strategy:weight_desc strategy:density_desc strategy:constrained_first \
            --scenario-set smoke \
            --output method_benchmark.json \
            --markdown-output method_benchmark.md

      - name: Run baseline benchmark
        run: |
          cd baseline
          python benchmark.py --output benchmark_baseline.json > /dev/null

      - name: Compare candidate with baseline
        run: |
          cd candidate
          python compare_benchmarks.py \
            --baseline ../baseline/benchmark_baseline.json \
            --candidate benchmark_candidate.json \
            --output comparison_report.json \
            --markdown-output comparison_report.md

      - name: Upload 3D visualizations
        uses: actions/upload-artifact@v4
        with:
          name: 3d-pallet-visualizations
          path: candidate/viz/*.html
          retention-days: 30

      - name: Add benchmark to job summary
        run: |
          cd candidate
          echo "# Solver Benchmark" >> "$GITHUB_STEP_SUMMARY"
          cat benchmark_output.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# Baseline Comparison" >> "$GITHUB_STEP_SUMMARY"
          cat comparison_report.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# Method Benchmark" >> "$GITHUB_STEP_SUMMARY"
          cat method_benchmark.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            baseline/benchmark_baseline.json
            candidate/benchmark_candidate.json
            candidate/benchmark_output.md
            candidate/comparison_report.json
            candidate/comparison_report.md
            candidate/method_benchmark.json
            candidate/method_benchmark.md

      - name: Post benchmark results to PR
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('candidate/benchmark_output.md', 'utf8');
            const comparisonOutput = fs.readFileSync('candidate/comparison_report.md', 'utf8');
            const methodOutput = fs.readFileSync('candidate/method_benchmark.md', 'utf8');
            const comparison = JSON.parse(fs.readFileSync('candidate/comparison_report.json', 'utf8'));

            const status = comparison.should_fail ? 'FAIL' : 'OK';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const vizSection = `\n\n### Visualizations\n\nDownload them from artifacts: ${runUrl}`;
            const body = `### ${status} Benchmark Results\n\n${output}\n\n${comparisonOutput}\n\n### Method Comparison\n\n${methodOutput}\n\nFull benchmark data is attached in CI artifacts as \`benchmark_candidate.json\`, \`benchmark_baseline.json\`, \`comparison_report.json\`, and \`method_benchmark.json\`. ${vizSection}\n\n---\nAutomated benchmark by CI`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('Automated benchmark by CI')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Enforce regression thresholds
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('candidate/comparison_report.json').read_text())
          if report.get('should_fail'):
              raise SystemExit('Benchmark regression thresholds exceeded')
          PY
