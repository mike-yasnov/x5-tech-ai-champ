name: CI — Tests & Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: [self-hosted, linux, x64, server]
    env:
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    strategy:
      matrix:
        include:
          - python-version: "3.11"
            container-image: python:3.11-bookworm
          - python-version: "3.12"
            container-image: python:3.12-bookworm

    container:
      image: ${{ matrix.container-image }}
      options: --user 1000:1000

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: .pip-cache
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Create virtual environment
        run: |
          python -m venv .venv
          ./.venv/bin/pip install -r requirements.txt
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  benchmark:
    runs-on: [self-hosted, linux, x64, server]
    needs: test
    if: github.event_name == 'pull_request'
    env:
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    container:
      image: python:3.12-bookworm
      options: --user 1000:1000
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: .pip-cache
          key: pip-${{ runner.os }}-3.12-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-3.12-

      - name: Create virtual environment
        run: |
          python -m venv .venv
          ./.venv/bin/pip install -r requirements.txt
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Run benchmark
        id: bench
        run: |
          python benchmark.py --output benchmark_results.json --viz viz 2>/dev/null | tee benchmark_output.md

      - name: Run constraints benchmark
        id: constraints_bench
        run: |
          python benchmark_constraints.py --output constraints_results.json 2>/dev/null | tee constraints_output.md

      - name: Upload 3D visualizations
        uses: actions/upload-artifact@v4
        with:
          name: 3d-pallet-visualizations
          path: viz/*.html
          retention-days: 30

      - name: Run strategy benchmark
        id: strategy_bench
        run: |
          python benchmark_strategies.py --limit 0 --output strategy_results.json --markdown-output strategy_output_full.md > /dev/null
          python benchmark_strategies.py --limit 8 --markdown-output strategy_output.md 2>/dev/null | tee strategy_output.md

      - name: Add benchmark to job summary
        run: |
          echo "# Solver Benchmark" >> "$GITHUB_STEP_SUMMARY"
          cat benchmark_output.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# Constraint Benchmark" >> "$GITHUB_STEP_SUMMARY"
          cat constraints_output.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# Strategy Benchmark (Top 8 per scenario)" >> "$GITHUB_STEP_SUMMARY"
          cat strategy_output.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark_results.json
            benchmark_output.md
            constraints_results.json
            constraints_output.md
            strategy_results.json
            strategy_output.md
            strategy_output_full.md

      - name: Post benchmark results to PR
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('benchmark_output.md', 'utf8');
            const constraintsOutput = fs.readFileSync('constraints_output.md', 'utf8');
            const strategyOutput = fs.readFileSync('strategy_output.md', 'utf8');
            const results = JSON.parse(fs.readFileSync('benchmark_results.json', 'utf8'));
            const constraintsResults = JSON.parse(fs.readFileSync('constraints_results.json', 'utf8'));

            const allValid = results.every(r => r.valid);
            const constraintsAllPass = constraintsResults.every(r => r.verdict === 'PASS');
            const status = allValid && constraintsAllPass ? '✅' : '❌';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const vizSection = `\n\n### 🎨 3D Visualizations\n\nInteractive 3D pallet views available as build artifacts:\n\n📦 [Download visualizations](${runUrl}) → Artifacts → \`3d-pallet-visualizations\`\n\nOpen the HTML files in a browser to rotate, zoom, and inspect placements.`;
            const body = `### ${status} Benchmark Results\n\n${output}\n\n### Constraint Benchmark\n\n${constraintsOutput}\n\n### Strategy Comparison (Top 8 per scenario)\n\n${strategyOutput}\n\nFull benchmark outputs are attached in CI artifacts as \`benchmark_results.json\`, \`constraints_results.json\`, \`strategy_results.json\`, and \`strategy_output_full.md\`. ${vizSection}\n\n---\n*Automated benchmark by CI*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('Automated benchmark by CI')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
