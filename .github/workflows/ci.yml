name: CI — Tests & Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run benchmark
        id: bench
        run: |
          python benchmark.py --output benchmark_results.json 2>/dev/null | tee benchmark_output.md

      - name: Run strategy benchmark
        id: strategy_bench
        run: |
          python benchmark_strategies.py --limit 8 --output strategy_results.json 2>/dev/null | tee strategy_output.md

      - name: Add benchmark to job summary
        run: |
          echo "# Solver Benchmark" >> "$GITHUB_STEP_SUMMARY"
          cat benchmark_output.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# Strategy Benchmark" >> "$GITHUB_STEP_SUMMARY"
          cat strategy_output.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark_results.json
            benchmark_output.md
            strategy_results.json
            strategy_output.md

      - name: Post benchmark results to PR
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('benchmark_output.md', 'utf8');
            const strategyOutput = fs.readFileSync('strategy_output.md', 'utf8');
            const results = JSON.parse(fs.readFileSync('benchmark_results.json', 'utf8'));

            const avg = results.reduce((s, r) => s + (r.final_score || 0), 0) / results.length;
            const allValid = results.every(r => r.valid);

            const status = allValid ? '✅' : '❌';
            const body = `### ${status} Benchmark Results\n\n${output}\n\n### Strategy Comparison\n\n${strategyOutput}\n\n---\n*Automated benchmark by CI*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('Automated benchmark by CI')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
